version: "3.9"

networks:
  rapidocourier-net:
    driver: bridge

volumes:
  postgres_auth_data:
  postgres_clientes_data:
  postgres_paquetes_data:

services:

# ── Vault (fuente de verdad de todos los secretos) ───────────────────────────

  vault:
    image: hashicorp/vault:1.15
    container_name: vault
    restart: unless-stopped
    environment:
      VAULT_DEV_ROOT_TOKEN_ID: dev-only-token
      VAULT_DEV_LISTEN_ADDRESS: 0.0.0.0:8200
    ports:
      - "8200:8200"
    cap_add:
      - IPC_LOCK
    networks:
      - rapidocourier-net
    command: vault server -dev
    healthcheck:
      test: ["CMD", "vault", "status", "-address=http://localhost:8200"]
      interval: 5s
      timeout: 3s
      retries: 10

  vault-init:
    image: hashicorp/vault:1.15
    container_name: vault-init
    depends_on:
      vault:
        condition: service_healthy
    environment:
      VAULT_ADDR: "http://vault:8200"
      VAULT_TOKEN: "dev-only-token"
    volumes:
      - ./vault/scripts:/vault/scripts
    networks:
      - rapidocourier-net
    entrypoint: ["/bin/sh", "-c"]
    command: ["/vault/scripts/init-vault.sh"]

  # ── Bases de datos ─────────────────────────────────────────────────────────

  postgres-auth:
    image: postgres:16-alpine
    container_name: postgres-auth
    restart: unless-stopped
    environment:
      POSTGRES_DB: rapidocourier_auth
      POSTGRES_USER: auth_user
      POSTGRES_PASSWORD: auth_pass
    volumes:
      - postgres_auth_data:/var/lib/postgresql/data
    networks:
      - rapidocourier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U auth_user -d rapidocourier_auth"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-clientes:
    image: postgres:16-alpine
    container_name: postgres-clientes
    restart: unless-stopped
    environment:
      POSTGRES_DB: rapidocourier_clientes
      POSTGRES_USER: clientes_user
      POSTGRES_PASSWORD: clientes_pass
    volumes:
      - postgres_clientes_data:/var/lib/postgresql/data
    networks:
      - rapidocourier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U clientes_user -d rapidocourier_clientes"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres-paquetes:
    image: postgres:16-alpine
    container_name: postgres-paquetes
    restart: unless-stopped
    environment:
      POSTGRES_DB: rapidocourier_paquetes
      POSTGRES_USER: paquetes_user
      POSTGRES_PASSWORD: paquetes_pass
    volumes:
      - postgres_paquetes_data:/var/lib/postgresql/data
    networks:
      - rapidocourier-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paquetes_user -d rapidocourier_paquetes"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Spring Cloud Infrastructure ─────────────────────────────────────────────

  config-server:
    build: ./config-server
    container_name: config-server
    restart: unless-stopped
    depends_on:
      vault-init:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
    ports:
      - "8888:8888"
    environment:
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: ${CONFIG_GIT_URI}
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
    networks:
      - rapidocourier-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8888/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  eureka-server:
    build: ./eureka-server
    container_name: eureka-server
    restart: unless-stopped
    ports:
      - "8761:8761"
    networks:
      - rapidocourier-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8761/actuator/health | grep UP"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 20s

  # ── API Gateway (punto de entrada único) ──────────────────────────────────────

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      VAULT_TOKEN: ${VAULT_TOKEN}
    depends_on:
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - rapidocourier-net

  # ── Microservicios de negocio (sin puertos host, solo red interna) ────────────

  auth-service:
    build: ./auth-service
    container_name: auth-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      VAULT_TOKEN: ${VAULT_TOKEN}
      DB_HOST: postgres-auth
      DB_USERNAME: auth_user
      DB_PASSWORD: auth_pass
    depends_on:
      postgres-auth:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - rapidocourier-net

  clients-service:
    build: ./clients-service
    container_name: clients-service
    restart: unless-stopped
    environment:
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      VAULT_TOKEN: ${VAULT_TOKEN}
      DB_HOST: postgres-clientes
      DB_USERNAME: clientes_user
      DB_PASSWORD: clientes_pass
    depends_on:
      postgres-clientes:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      config-server:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - rapidocourier-net