name: CI/CD - Auth Service

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'auth-service/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'auth-service/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: auth-service

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn test -B

      - name: Build package
        run: mvn package -DskipTests -B

      - name: Build Docker image
        run: |
          docker build -t rapidocurier/auth-service:${{ github.sha }} .
          docker build -t rapidocurier/auth-service:latest .