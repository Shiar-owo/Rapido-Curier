name: CI/CD - API Gateway

on:
  push:
    branches: [ main, develop, api-gateway ]
    paths:
      - 'api-gateway/**'
  pull_request:
    branches: [ main, develop, api-gateway ]
    paths:
      - 'api-gateway/**'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api-gateway

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Run tests
        run: mvn test -B -U

      - name: Build package
        run: mvn package -DskipTests -B -U

      - name: Build Docker image
        run: |
          docker build -t rapidocurier/api-gateway:${{ github.sha }} .
          docker build -t rapidocurier/api-gateway:latest .
