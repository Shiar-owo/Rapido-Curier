spring:
  application:
    name: config-server
  cloud:
    config:
      server:
        composite:
          - type: git
            uri: ${SPRING_CLOUD_CONFIG_SERVER_GIT_URI:https://github.com/Shiar-owo/Rapido-Curier-Configs}
            default-label: main
            search-paths: /
            timeout: 10
            force-pull: true
          - type: vault
            host: vault
            port: 8200
            scheme: http
            backend: secret/rapidocourier
            kv-version: 2
            authentication: TOKEN
            token: ${VAULT_TOKEN}
            default-key: application

server:
  port: 8888

management:
  endpoints:
    web:
      exposure:
        include: health,info,env
  endpoint:
    health:
      show-details: always

eureka:
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: ${EUREKA_CLIENT_SERVICEURL_DEFAULTZONE:http://eureka-server:8761/eureka/}

logging:
  level:
    org.springframework.cloud.config.server: DEBUG
    org.eclipse.jgit: DEBUG